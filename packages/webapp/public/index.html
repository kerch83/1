<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Decentralized P2P Chat</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, sans-serif;
        background: #0b1120;
        color: #e2e8f0;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top, #172554 0%, #0b1120 55%);
      }

      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 64px 24px;
      }

      .hero {
        margin-bottom: 32px;
      }

      .eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: #93c5fd;
      }

      h1 {
        font-size: clamp(2.5rem, 6vw, 4.5rem);
        margin: 0 0 16px;
      }

      .lead {
        font-size: 1.1rem;
        line-height: 1.6;
        max-width: 720px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }

      .card {
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.3);
      }

      h2 {
        margin-top: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <div id="app"></div>
    </main>
    <script type="module" src="/dist/main.js"></script>
  </body>
</html>
